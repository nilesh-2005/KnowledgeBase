spring.application.name=knowledgebase

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/knowledgebase}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

server.error.include-message=never
debug=true

# Flyway Configuration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.enabled=true

# Increase max upload size
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:PT2H}
app.jwt.issuer=${JWT_ISSUER:knowledge-base}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Spring AI Ollama
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.embedding.options.model=nomic-embed-text
spring.ai.ollama.chat.options.model=${OLLAMA_CHAT_MODEL:qwen2.5:7b-instruct}
spring.ai.ollama.chat.options.temperature=0.2

# RAG Configuration
app.rag.top-k=5
app.rag.score-threshold=0.35
app.rag.fetch-multiplier=2
app.rag.max-context-chars=12000
app.rag.excerpt-length=200
app.rag.llm-timeout-seconds=120
