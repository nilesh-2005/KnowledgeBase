spring.application.name=knowledgebase

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/knowledgebase}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

server.error.include-message=never

app.jwt.secret=${JWT_SECRET:knowledge-base-default-jwt-secret-key-knowledge-base-default-jwt-secret-key}
app.jwt.expiration=PT2H
app.jwt.issuer=knowledge-base