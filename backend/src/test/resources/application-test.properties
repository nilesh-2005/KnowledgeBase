spring.datasource.url=jdbc:h2:mem:knowledgebase;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE DOMAIN IF NOT EXISTS vector AS double array
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=false

app.jwt.secret=knowledge-base-test-secret-key-knowledge-base-test-secret-key
app.jwt.expiration=PT1H
app.jwt.issuer=knowledge-base-test
app.cors.allowed-origins=http://localhost:4321,http://localhost:3000

app.rag.top-k=5
app.rag.score-threshold=0.35
app.rag.fetch-multiplier=2
app.rag.max-context-chars=12000
app.rag.excerpt-length=200
app.rag.llm-timeout-seconds=120

spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.embedding.options.model=nomic-embed-text
spring.ai.ollama.chat.options.model=qwen2.5:7b-instruct
spring.ai.ollama.chat.options.temperature=0.2
