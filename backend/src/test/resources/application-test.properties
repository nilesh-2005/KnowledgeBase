spring.datasource.url=jdbc:h2:mem:knowledgebase;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

app.jwt.secret=knowledge-base-test-secret-key-knowledge-base-test-secret-key
app.jwt.expiration=PT1H
app.jwt.issuer=knowledge-base-test